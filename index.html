<!Doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="index.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>Weather App</title>
    </head>
    <body onload="fetchData('hyderabad')">
        <div class="container">
            <h1 class="text-center">Weather App</h1>
            <input class="form-control" type="text" id="cityName" placeholder="Enter city name"><br><br>
            <button class="btn btn-outline-secondary" onclick="fetchData()">Get Temperature</button><br><br>
            <p id="temperature"  
            class="temp-box bg-secondary text-info d-flex justify-content-center align-items-center text-center"
            ></p>
        </div>
        <script src="index.js"></script>
    </body>
</html>
